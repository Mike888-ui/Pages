<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RealEstateAI V7｜黑科技賣屋雲端系統｜Supabase Fix</title>
<style>
:root{
  --bg:#040812;--panel:rgba(9,17,34,.86);--panel2:rgba(15,23,42,.92);--line:rgba(125,211,252,.25);
  --text:#e5f4ff;--muted:#94a3b8;--cyan:#22d3ee;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --shadow:0 24px 80px rgba(0,0,0,.48);--radius:20px;
}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;overflow:auto;font-family:"Microsoft JhengHei",Arial,sans-serif;background:var(--bg);color:var(--text)}
body:before{content:"";position:fixed;inset:0;z-index:-3;background:#020617 url("assets/black_tech_realestate_bg.png") center/cover no-repeat;filter:saturate(1.08) contrast(1.04);}
body:after{content:"";position:fixed;inset:0;z-index:-2;background:radial-gradient(circle at 18% 15%,rgba(34,211,238,.24),transparent 35%),linear-gradient(90deg,rgba(2,6,23,.85),rgba(2,6,23,.45),rgba(2,6,23,.92)),linear-gradient(180deg,rgba(2,6,23,.3),#020617 90%)}
button,input,select,textarea{font-family:inherit}a{color:var(--cyan)}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line);background:rgba(2,6,23,.82);backdrop-filter:blur(18px)}
.brand{display:flex;align-items:center;gap:12px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#0ea5e9,#22d3ee,#111827);box-shadow:0 0 32px rgba(34,211,238,.55);display:grid;place-items:center;font-weight:1000;color:#00111b}.brand h1{font-size:18px;margin:0}.brand span{display:block;font-size:12px;color:var(--muted);margin-top:2px}.userbox{text-align:right;font-size:13px;color:var(--muted)}
.shell{display:grid;grid-template-columns:280px minmax(0,1fr);min-height:calc(100vh - 72px)}
.nav{position:sticky;top:71px;height:calc(100vh - 72px);overflow:auto;padding:16px;border-right:1px solid var(--line);background:rgba(2,6,23,.58);backdrop-filter:blur(16px)}
.nav .group{font-size:12px;color:#67e8f9;margin:12px 8px 7px;letter-spacing:.08em}.nav button{width:100%;border:1px solid transparent;background:transparent;color:var(--text);padding:12px 12px;border-radius:14px;text-align:left;font-weight:800;cursor:pointer;margin:3px 0;display:flex;align-items:center;justify-content:space-between;gap:8px}.nav button:hover,.nav button.on{background:rgba(34,211,238,.12);border-color:rgba(34,211,238,.28);box-shadow:inset 0 0 0 1px rgba(59,130,246,.12)}
main{min-width:0;padding:22px;overflow:auto}.hero{min-height:390px;border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);overflow:hidden;position:relative;background:linear-gradient(135deg,rgba(2,6,23,.48),rgba(8,47,73,.25));display:grid;align-items:end;padding:36px;margin-bottom:18px}.hero:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(2,6,23,.95),rgba(2,6,23,.35),rgba(2,6,23,.88));}.hero:after{content:"";position:absolute;inset:-1px;background-image:linear-gradient(rgba(34,211,238,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,.08) 1px,transparent 1px);background-size:48px 48px;mask-image:linear-gradient(90deg,#000,transparent 72%);opacity:.7}.hero-content{position:relative;z-index:2;max-width:760px}.badge{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(34,211,238,.4);background:rgba(8,47,73,.42);color:#a5f3fc;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:900}.hero h2{font-size:42px;line-height:1.12;margin:16px 0 10px}.hero p{font-size:16px;color:#cbd5e1;line-height:1.75;max-width:760px}.hero-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
.card{background:var(--panel);border:1px solid rgba(125,211,252,.22);border-radius:var(--radius);box-shadow:0 18px 60px rgba(0,0,0,.28);padding:18px;margin-bottom:16px;backdrop-filter:blur(18px)}.card h2,.card h3{margin:0 0 12px}.glass{background:rgba(15,23,42,.72)}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.formgrid{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:12px}.formgrid3{display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));gap:12px}.field label{display:block;color:#bae6fd;font-size:13px;font-weight:800;margin:0 0 6px}
input,select,textarea{width:100%;border:1px solid rgba(148,163,184,.35);background:rgba(2,6,23,.58);color:var(--text);border-radius:13px;padding:11px 12px;font-size:15px;outline:none}input:focus,select:focus,textarea:focus{border-color:rgba(34,211,238,.75);box-shadow:0 0 0 3px rgba(34,211,238,.12)}textarea{min-height:108px;resize:vertical}option{background:#0f172a}.hint{font-size:13px;color:var(--muted);line-height:1.65}.ok{color:#34d399}.err{color:#f87171}.warn{color:#fbbf24}.muted{color:var(--muted)}.small{font-size:13px}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(148,163,184,.24);background:rgba(15,23,42,.75);padding:5px 9px;border-radius:999px;font-size:12px;color:#cbd5e1}.sold{background:rgba(239,68,68,.18);color:#fecaca;border-color:rgba(239,68,68,.35)}.live{background:rgba(16,185,129,.17);color:#bbf7d0;border-color:rgba(16,185,129,.35)}.draft{background:rgba(245,158,11,.17);color:#fde68a;border-color:rgba(245,158,11,.35)}
.btn{border:0;border-radius:13px;padding:11px 15px;font-weight:1000;cursor:pointer;background:linear-gradient(135deg,#0891b2,#2563eb);color:white;box-shadow:0 12px 32px rgba(37,99,235,.24);margin:3px 4px 3px 0}.btn:hover{filter:brightness(1.09)}.btn.gray{background:#334155;box-shadow:none}.btn.red{background:#dc2626;box-shadow:none}.btn.green{background:#059669;box-shadow:none}.btn.light{background:#e0f2fe;color:#0f172a;box-shadow:none}.btn.ghost{background:rgba(15,23,42,.75);border:1px solid rgba(125,211,252,.25);box-shadow:none}.btn:disabled{opacity:.5;cursor:not-allowed}
.kpi{min-height:118px;position:relative;overflow:hidden}.kpi:after{content:"";position:absolute;right:-30px;top:-30px;width:110px;height:110px;border-radius:999px;background:radial-gradient(circle,rgba(34,211,238,.28),transparent 66%)}.kpi span{font-size:13px;color:#93c5fd}.kpi b{display:block;font-size:32px;margin-top:8px}.kpi small{color:var(--muted)}
.tablebox{width:100%;overflow:auto;border:1px solid rgba(125,211,252,.18);border-radius:16px;background:rgba(2,6,23,.38);resize:both;min-height:220px;max-height:none}.tablebox table{min-width:1120px;width:100%;border-collapse:collapse}.tablebox th,.tablebox td{padding:10px;border-bottom:1px solid rgba(148,163,184,.18);text-align:left;vertical-align:top;font-size:14px}.tablebox th{position:sticky;top:0;background:#0f172a;color:#a5f3fc;z-index:1}.tablebox td{color:#e2e8f0}.nowrap{white-space:nowrap}.copy{white-space:pre-wrap;line-height:1.75;background:rgba(2,6,23,.52);border:1px dashed rgba(34,211,238,.36);border-radius:16px;padding:14px;overflow:auto;resize:both;min-height:150px}.resizable{overflow:auto;resize:both;min-width:260px;min-height:220px;max-width:100%;max-height:none}
.listing-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.listing{overflow:hidden;padding:0}.photo-strip{display:flex;gap:8px;overflow:auto;padding:10px;background:rgba(2,6,23,.4);scroll-snap-type:x mandatory}.photo-strip img{height:190px;min-width:100%;object-fit:cover;border-radius:16px;scroll-snap-align:start;background:#111827}.listing-body{padding:16px}.price{font-size:24px;font-weight:1000;color:#67e8f9}.meta{display:flex;flex-wrap:wrap;gap:7px;margin:9px 0}.filters{display:grid;grid-template-columns:repeat(6,minmax(130px,1fr));gap:10px}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}.modal{width:min(1100px,96vw);max-height:92vh;overflow:auto;background:#07111f;border:1px solid rgba(34,211,238,.32);border-radius:22px;box-shadow:0 30px 100px rgba(0,0,0,.66);padding:18px}.modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.modal.show,.modal-mask.show{display:flex}.thumbs{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.thumb{border:1px solid rgba(125,211,252,.22);border-radius:14px;padding:8px;background:rgba(2,6,23,.42)}.thumb img{width:100%;height:120px;object-fit:cover;border-radius:10px}.photo-empty{height:190px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(8,47,73,.65),rgba(15,23,42,.85));color:#7dd3fc;border-radius:16px}
@media(max-width:1180px){.grid{grid-template-columns:repeat(2,1fr)}.listing-grid{grid-template-columns:repeat(2,1fr)}.filters{grid-template-columns:repeat(2,1fr)}.formgrid{grid-template-columns:repeat(2,minmax(180px,1fr))}}
@media(max-width:860px){.shell{display:block}.nav{position:relative;top:auto;height:auto;display:grid;grid-template-columns:repeat(2,1fr)}main{padding:14px}.hero{min-height:330px;padding:22px}.hero h2{font-size:30px}.grid,.grid2,.grid3,.listing-grid,.formgrid,.formgrid3,.filters{grid-template-columns:1fr}.topbar{align-items:flex-start}.userbox{display:none}.thumbs{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><div class="logo">AI</div><div><h1>RealEstateAI V7 黑科技賣屋系統</h1><span>登入權限｜買方瀏覽｜主權限管理｜照片管理｜AI BOT 問答</span></div></div>
  <div class="userbox" id="userBox">尚未登入</div>
</div>
<div class="shell"><aside class="nav" id="nav"></aside><main id="app"></main></div>
<div class="modal-mask" id="modalMask"><div class="modal" id="modalBox"></div></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
const app=$("#app"), nav=$("#nav"), userBox=$("#userBox"), modalMask=$("#modalMask"), modalBox=$("#modalBox");
let sb=null, user=null, profile=null;
let cache={properties:[],photos:[],questions:[],profiles:[]};
const VISIBLE_STATUS=["銷售中","已售出","保留中"];
const statusBadge=s=>s==="已售出"?"sold":(s==="銷售中"?"live":"draft");
const today=()=>new Date().toISOString().slice(0,10);
const cfg=()=>({url:localStorage.getItem("SUPABASE_URL")||"",key:localStorage.getItem("SUPABASE_ANON_KEY")||""});
function isSupabaseUrl(u){
  if(!u) return false;
  try{
    const x=new URL(u.trim());
    return x.protocol==="https:" && /\.supabase\.co$/i.test(x.hostname);
  }catch(e){return false}
}
function isSupabaseAnonKey(k){
  k=String(k||"").trim();
  return k.startsWith("eyJ") && k.split(".").length===3 && k.length>100;
}
function configError(c=cfg()){
  const url=String(c.url||"").trim();
  const key=String(c.key||"").trim();
  if(!url&&!key) return "";
  const errors=[];
  if(!isSupabaseUrl(url)){
    errors.push("SUPABASE_URL 必須是 Supabase Project URL，例如 https://xxxx.supabase.co，不能填 GitHub Pages 網址。");
  }
  if(!isSupabaseAnonKey(key)){
    errors.push("SUPABASE_ANON_KEY 必須是 Supabase anon public key，通常以 eyJ 開頭，不能填 GitHub Commit 的 GPG Key。");
  }
  return errors.join("\n");
}
const esc=x=>String(x??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
const val=id=>document.getElementById(id)?.value?.trim()||"";
const num=id=>Number(val(id)||0);
const isAdmin=()=>profile?.role==="admin";
const fmtPrice=n=>Number(n||0).toLocaleString("zh-TW");
const short=x=>String(x||"").length>70?String(x).slice(0,70)+"…":String(x||"");
function toast(msg){alert(msg)}
function initClient(){
  const c=cfg();
  const err=configError(c);
  if(c.url&&c.key&&!err){
    try{
      sb=createClient(c.url,c.key,{auth:{persistSession:true,autoRefreshToken:true}});
    }catch(e){
      console.warn("Supabase init failed:", e);
      sb=null;
    }
  }else{
    sb=null;
  }
}
initClient();

async function refreshUser(){
  if(!sb){user=null;profile=null;renderUserBox();return}
  try{
    const {data}=await sb.auth.getUser(); user=data?.user||null;
    if(user){await ensureProfile(); await loadProfile()} else profile=null;
  }catch(e){
    console.warn("Supabase auth error:", e);
    user=null; profile=null; sb=null;
    const msg=String(e?.message||e||"");
    if(msg.includes("Unexpected token") || msg.includes("not valid JSON")){
      localStorage.setItem("LAST_SUPABASE_ERROR","Supabase URL / anon key 設定錯誤：目前伺服器回傳 HTML，不是 Supabase JSON API。請不要把 GitHub Pages 網址填到 SUPABASE_URL。");
    }else{
      localStorage.setItem("LAST_SUPABASE_ERROR",msg);
    }
  }
  renderUserBox();
}
async function ensureProfile(){
  if(!user) return;
  const {data}=await sb.from("profiles").select("id").eq("id",user.id).maybeSingle();
  if(!data){await sb.from("profiles").insert({id:user.id,email:user.email,display_name:user.user_metadata?.display_name||user.email?.split("@")[0],role:"buyer"});}
}
async function loadProfile(){
  const {data,error}=await sb.from("profiles").select("*").eq("id",user.id).maybeSingle();
  if(error){console.warn(error.message); profile={id:user.id,email:user.email,role:"buyer"};}
  else profile=data||{id:user.id,email:user.email,role:"buyer"};
}
function renderUserBox(){
  if(!sb){userBox.innerHTML="未設定 Supabase";return}
  if(!user){userBox.innerHTML="尚未登入";return}
  userBox.innerHTML=`${esc(user.email)}<br><span class="pill ${isAdmin()?"live":""}">${isAdmin()?"主權限人 Admin":"買方會員 Buyer"}</span>`;
}
function requireSB(){
  const err=configError();
  if(err || !sb){route("setup");return false}
  return true
}
function requireLogin(){if(!requireSB())return false;if(!user){route("auth");return false}return true}
function requireAdmin(){if(!requireLogin())return false;if(!isAdmin()){app.innerHTML=msg("此功能只有主權限人可以使用。", "err");return false}return true}
function msg(text,cls=""){return `<div class="card ${cls}">${text}</div>`}
function field(label,id,type="text",value="",extra=""){return `<div class="field"><label>${label}</label><input id="${id}" type="${type}" value="${esc(value)}" ${extra}></div>`}
function area(label,id,value="",extra=""){return `<div class="field"><label>${label}</label><textarea id="${id}" ${extra}>${esc(value)}</textarea></div>`}
function selectField(label,id,options,value=""){return `<div class="field"><label>${label}</label><select id="${id}">${options.map(o=>`<option ${o==value?"selected":""}>${esc(o)}</option>`).join("")}</select></div>`}
function kpi(a,b,c=""){return `<div class="card kpi"><span>${a}</span><b>${b}</b><small>${c}</small></div>`}
function table(rows,cols){
  if(!rows?.length) return `<div class="card hint">目前沒有資料。</div>`;
  return `<div class="tablebox"><table><thead><tr>${cols.map(c=>`<th>${c[1]}</th>`).join("")}</tr></thead><tbody>${rows.map((r,i)=>`<tr>${cols.map(c=>`<td>${typeof c[0]==="function"?c[0](r,i):esc(r[c[0]])}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
}
function copyText(id){navigator.clipboard?.writeText(document.getElementById(id)?.innerText||"");toast("已複製")}
function dl(name,text,type="application/json"){let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click()}
function showModal(html){modalBox.innerHTML=html;modalMask.classList.add("show");}
function closeModal(){modalMask.classList.remove("show");modalBox.innerHTML=""}
modalMask.addEventListener("click",e=>{if(e.target===modalMask)closeModal()});
window.closeModal=closeModal; window.copyText=copyText; window.dl=dl;

function navItems(){
  const base=[{g:"系統",id:"setup",t:"Supabase 設定"},{g:"系統",id:"auth",t:user?"帳號 / 登出":"登入 / 申請帳號"},{g:"前台",id:"home",t:"黑科技首頁"}];
  if(!user) return base;
  const buyer=[{g:"買方",id:"listings",t:"賣屋資訊瀏覽"},{g:"買方",id:"ask",t:"買方詢問 AI BOT"},{g:"買方",id:"myq",t:"我的詢問紀錄"}];
  const admin=isAdmin()?[{g:"主權限",id:"adminProp",t:"新增 / 更新賣屋資料"},{g:"主權限",id:"photos",t:"照片新增 / 刪除"},{g:"主權限",id:"questions",t:"買方問題管理"},{g:"主權限",id:"users",t:"帳號權限管理"},{g:"資料",id:"backup",t:"雲端備份匯出"}]:[];
  return [...base,...buyer,...admin,{g:"說明",id:"help",t:"使用說明"}];
}
function navRender(active){
  const items=navItems(); let html="", last="";
  for(const it of items){if(it.g!==last){html+=`<div class="group">${it.g}</div>`; last=it.g} html+=`<button class="${it.id===active?"on":""}" onclick="route('${it.id}')"><span>${it.t}</span><span>›</span></button>`}
  nav.innerHTML=html;
}
window.route=async function(p){await refreshUser(); const page=p||"home"; navRender(page); location.hash=page; (views[page]||views.home)();}

async function fetchProperties(){const {data,error}=await sb.from("properties").select("*").order("created_at",{ascending:false}); if(error){toast(error.message);return[]} cache.properties=data||[]; return cache.properties;}
async function fetchPhotos(){const {data,error}=await sb.from("property_photos").select("*").order("sort_order",{ascending:true}); if(error){console.warn(error.message);return[]} cache.photos=data||[]; return cache.photos;}
async function propertyPhotos(id){if(!cache.photos.length) await fetchPhotos(); return cache.photos.filter(p=>p.property_id===id)}
async function fetchQuestions(){const {data,error}=await sb.from("buyer_questions").select("*,properties(title,city,district,price,status)").order("created_at",{ascending:false}); if(error){toast(error.message);return[]} cache.questions=data||[]; return cache.questions;}
async function insertRow(t,row){const {error}=await sb.from(t).insert(row); if(error) toast(error.message); else toast("已儲存")}
async function updateRow(t,id,row){const {error}=await sb.from(t).update(row).eq("id",id); if(error) toast(error.message); else toast("已更新")}
async function deleteRow(t,id,after){if(!confirm("確定刪除？"))return; const {error}=await sb.from(t).delete().eq("id",id); if(error) toast(error.message); else {toast("已刪除"); if(after) after();}}
window.deleteRow=deleteRow;

function botAnalyze(question,prop){
  const q=String(question||""); let intent="需求確認", risk="AI 回覆為初步說明，正式價格、貸款、屋況與合約仍需由專人確認。";
  let reply="我先幫您整理需求。請提供想找的區域、預算、房數、是否需要車位與入住時間，我可以先幫您比對目前可看的物件。";
  if(/價格|便宜|殺價|議價|降價|出價|行情/.test(q)){intent="價格 / 議價"; reply=`這題可以從三個方向評估：一是同區近期行情，二是屋況整理成本，三是屋主出售急迫性。${prop?`您詢問的「${prop.title}」目前開價 ${fmtPrice(prop.price)} 萬，建議先比較同區屋齡、坪數、車位與樓層，再抓合理出價區間。`:"若您指定物件，我可以依物件條件整理初步議價話術。"}`;}
  else if(/貸款|自備|頭期|月付|利率|銀行|成數/.test(q)){intent="貸款 / 自備款"; reply=`建議先抓總價、自備款、貸款成數、年限與月付壓力。${prop?`以「${prop.title}」開價 ${fmtPrice(prop.price)} 萬來看，仍需再加上稅費、代書、裝修與搬家預備金。`:"選定物件後，可以再做月付概算。"}`;}
  else if(/漏水|壁癌|屋況|驗屋|噪音|採光|水壓|電線|管線/.test(q)){intent="屋況風險"; reply="看屋建議重點檢查：天花板與窗邊是否滲水、牆角壁癌、浴室排水與通風、水壓、電箱、管線、噪音來源、車位動線與管理狀況。必要時可安排專業驗屋。";}
  else if(/捷運|學校|生活|交通|商圈|公園|機能/.test(q)){intent="生活機能"; reply=`生活機能要看通勤時間、學區、採買、醫療、公園與噪音。${prop?`「${prop.title}」可先確認地址周邊捷運/公車、學校與商圈距離，再決定是否安排看屋。`:"您可以指定區域或物件，我再幫您整理比較重點。"}`;}
  else if(/已售|售出|還有嗎|可以看嗎|預約|看屋/.test(q)){intent="預約看屋 / 物件狀態"; reply=prop?`「${prop.title}」目前狀態是「${prop.status}」。若仍可安排，我建議留下方便看屋時段、聯絡電話與同行人數，我會請專人確認。`:"請先選擇想看的物件，我可以幫您送出看屋詢問。";}
  return {intent,reply,risk,full:`【AI BOT 自動回覆】\n問題類型：${intent}\n\n${reply}\n\n【提醒】\n${risk}`};
}

  showModal(`<div class="modal-head"><h2>${esc(p.title)}</h2><button class="btn gray" onclick="closeModal()">關閉</button></div><div class="photo-strip resizable">${photos.length?photos.map(ph=>`<img src="${esc(ph.photo_url)}">`).join(""):`<div class="photo-empty">尚未上傳照片</div>`}</div><div class="grid2"><div class="card glass"><h3>物件資訊</h3><p class="price">${fmtPrice(p.price)} 萬</p><p>${esc(p.city||"")}${esc(p.district||"")} ${esc(p.address||"")}</p><div class="meta"><span class="pill ${statusBadge(p.status)}">${esc(p.status)}</span><span class="pill">${esc(p.ping||0)} 坪</span><span class="pill">${esc(p.rooms||"")}</span><span class="pill">${esc(p.building_type||"")}</span><span class="pill">屋齡 ${esc(p.age||0)}</span></div></div><div class="card glass"><h3>交通 / 學區</h3><p class="hint">捷運：${esc(p.mrt||"未填")}</p><p class="hint">學區：${esc(p.school||"未填")}</p><p class="hint">社區：${esc(p.community||"未填")}</p></div></div><div class="card glass"><h3>完整說明</h3><div class="copy">${esc(p.description||"尚未填寫")}</div></div><div class="card glass"><h3>特色 / 風險提醒</h3><p class="hint">特色：${esc(p.tags||"未填")}</p><p class="warn">${esc(p.defects||"未填風險提醒")}</p></div><button class="btn" onclick="closeModal();route('ask');setTimeout(()=>{const e=document.getElementById('qProp');if(e)e.value='${p.id}'},200)">詢問這間</button>`);
}

function fileToDataUrl(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})}
window.addPhoto=async function(){
  if(!requireAdmin())return; const property_id=val("photoProp"); if(!property_id){toast("請先選擇物件");return}
  let photo_url=val("photoUrl"); const file=document.getElementById("photoFile")?.files?.[0]; if(file) photo_url=await fileToDataUrl(file);
  if(!photo_url){toast("請貼照片網址或上傳照片");return}
  await insertRow("property_photos",{property_id,photo_url,caption:val("photoCap"),sort_order:num("photoSort")}); await fetchPhotos(); renderPhotoList();
}
window.renderPhotoList=function(){
  const pid=val("photoProp"); const rows=cache.photos.filter(p=>p.property_id===pid);
  $("#photoOut").innerHTML=`<div class="card"><h3>目前照片</h3>${rows.length?`<div class="thumbs">${rows.map(ph=>`<div class="thumb"><img src="${esc(ph.photo_url)}"><p class="hint">${esc(ph.caption||"")}</p><button class="btn red" onclick="deleteRow('property_photos','${ph.id}',async()=>{await fetchPhotos();renderPhotoList()})">刪除照片</button></div>`).join("")}</div>`:"<p class='hint'>此物件尚未新增照片。</p>"}</div>`;
}

window.makeQuestion=async function(){
  if(!requireLogin())return; const property_id=val("qProp")||null, question=val("qText"); if(!question){toast("請輸入問題");return}
  const prop=cache.properties.find(p=>p.id===property_id); const b=botAnalyze(question,prop);
  await insertRow("buyer_questions",{property_id,buyer_name:val("qName"),contact:val("qContact"),question,intent:b.intent,bot_answer:b.full,status:"新問題"});
  $("#qOut").innerHTML=`<div class="card"><h3>AI BOT 已自動回覆</h3><button class="btn light" onclick="copyText('botAns')">複製回覆</button><div id="botAns" class="copy">${esc(b.full)}</div></div>`;
}
window.updateQuestionStatus=async function(id,status){await updateRow("buyer_questions",id,{status,updated_at:new Date().toISOString()});}
window.updateRole=async function(id,role){if(id===user.id&&role!=="admin"&&!confirm("你正在調整自己的主權限，確定？"))return; await updateRow("profiles",id,{role,updated_at:new Date().toISOString()}); await route("users");}

window.saveConfig=()=>{
  const next={url:val("su"),key:val("sk")};
  const err=configError(next);
  if(!next.url||!next.key){toast("請填入 Supabase Project URL 與 anon public key。");return}
  if(err){toast("Supabase 設定錯誤：\n\n"+err);return}
  localStorage.removeItem("LAST_SUPABASE_ERROR");
  localStorage.setItem("SUPABASE_URL",next.url);
  localStorage.setItem("SUPABASE_ANON_KEY",next.key);
  location.reload()
}
window.clearConfig=()=>{
  localStorage.removeItem("SUPABASE_URL");
  localStorage.removeItem("SUPABASE_ANON_KEY");
  localStorage.removeItem("LAST_SUPABASE_ERROR");
  location.reload()
}
window.signup=async()=>{if(!requireSB())return; const email=val("regEmail"), password=val("regPw"), display_name=val("regName"); if(!email||!password){toast("請輸入 Email 與 Password");return} const {error}=await sb.auth.signUp({email,password,options:{data:{display_name}}}); toast(error?error.message:"申請完成。若有信箱驗證，請先收信；沒有驗證時可直接登入。")}
window.login=async()=>{if(!requireSB())return; const {error}=await sb.auth.signInWithPassword({email:val("loginEmail"),password:val("loginPw")}); if(error) toast(error.message); else route("home")}
window.logout=async()=>{await sb.auth.signOut(); user=null;profile=null;route("auth")}

sb?.auth.onAuthStateChange(()=>setTimeout(()=>route(location.hash.replace("#","")||"home"),0));
route(location.hash.replace("#","")||"home");
</script>
</body>
</html>
